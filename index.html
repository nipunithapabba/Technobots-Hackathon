<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusCruise Bus Tracker</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Inter, Segoe UI, sans-serif;
    }

    body {
      --bg: #07111f;
      --panel: rgba(15, 23, 42, 0.94);
      --panel-strong: rgba(30, 41, 59, 0.96);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: rgba(148, 163, 184, 0.24);
      --accent: #38bdf8;
      --stop-fill: #0f172a;

      color: var(--text);
      background: var(--bg);
    }

    body.bright {
      --bg: #eaf7ff;
      --panel: rgba(255, 255, 255, 0.94);
      --panel-strong: rgba(240, 249, 255, 0.96);
      --text: #0f172a;
      --muted: #475569;
      --border: rgba(14, 116, 144, 0.22);
      --accent: #0284c7;
      --stop-fill: #ffffff;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background:
        radial-gradient(circle at 16% 12%, rgba(56, 189, 248, 0.22), transparent 32%),
        radial-gradient(circle at 84% 14%, rgba(244, 114, 182, 0.18), transparent 28%),
        var(--bg);
    }

    header {
      min-height: 74px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }

    .eyebrow {
      margin: 0 0 2px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: 1.45rem;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button {
      font: inherit;
    }

    .control-button {
      border: 1px solid var(--border);
      color: var(--text);
      background: var(--panel-strong);
      border-radius: 999px;
      padding: 9px 14px;
      cursor: pointer;
    }

    .network-badge {
      min-width: 82px;
      text-align: center;
      padding: 9px 13px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 900;
      color: white;
      background: linear-gradient(135deg, #16a34a, #22c55e);
    }

    .network-badge.offline {
      background: linear-gradient(135deg, #dc2626, #f97316);
    }

    .network-badge.syncing {
      background: linear-gradient(135deg, #d97706, #facc15);
    }

    .layout {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      transition: grid-template-columns 0.28s ease;
    }

    .layout.collapsed {
      grid-template-columns: 0 minmax(0, 1fr);
    }

    aside {
      position: relative;
      background: var(--panel);
      border-right: 1px solid var(--border);
      z-index: 7;
      min-width: 0;
    }

    .sidebar-content {
      width: 330px;
      height: 100%;
      padding: 18px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .layout.collapsed .sidebar-content {
      opacity: 0;
      pointer-events: none;
    }

    .collapse-tab {
      position: absolute;
      right: -19px;
      top: 22px;
      width: 38px;
      height: 52px;
      border: 1px solid var(--border);
      border-left: 0;
      border-radius: 0 18px 18px 0;
      background: var(--panel-strong);
      color: var(--text);
      font-size: 1.8rem;
      cursor: pointer;
      z-index: 20;
    }

    .section-heading {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.76rem;
      font-weight: 900;
    }

    .section-heading b {
      color: var(--accent);
    }

    .bus-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bus-card {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: var(--panel-strong);
      color: var(--text);
      border-radius: 20px;
      padding: 14px;
      cursor: pointer;
    }

    .bus-card.active,
    .bus-card:hover {
      border-color: var(--accent);
    }

    .bus-card-header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .bus-color {
      width: 13px;
      height: 42px;
      border-radius: 999px;
    }

    .bus-card h2 {
      margin: 0;
      font-size: 1rem;
    }

    .bus-card p,
    .bus-card small {
      margin: 3px 0 0;
      color: var(--muted);
    }

    .bus-card small {
      padding: 4px 8px;
      border: 1px solid rgba(34, 197, 94, 0.28);
      background: rgba(34, 197, 94, 0.12);
      color: #22c55e;
      border-radius: 999px;
      font-weight: 800;
    }

    .bus-details {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
    }

    .bus-details strong {
      color: var(--text);
      text-align: right;
    }

    .buffer-card {
      margin-top: auto;
      border: 1px dashed var(--border);
      border-radius: 18px;
      padding: 14px;
      color: var(--muted);
      background: var(--panel-strong);
      display: grid;
      gap: 4px;
    }

    .buffer-card strong {
      color: #f59e0b;
      font-size: 1.7rem;
    }

    .map-panel {
      position: relative;
      min-width: 0;
    }

    #map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .map-hint {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--border);
      font-size: 0.86rem;
      text-align: center;
    }

    footer {
      min-height: 42px;
      padding: 9px 20px;
      border-top: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      display: flex;
      gap: 18px;
      z-index: 8;
    }

    footer b {
      color: var(--text);
    }

    .bus-marker {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      transform-origin: center;
      filter: drop-shadow(0 0 10px var(--marker-color));
    }

    .bus-marker span {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      color: #020617;
      background: linear-gradient(135deg, #ffffff 0%, var(--marker-color) 42%, #111827 100%);
      border: 2px solid #ffffff;
      border-radius: 11px 11px 11px 3px;
      font-size: 1.25rem;
      font-weight: 900;
      transform: perspective(80px) rotateX(18deg);
      box-shadow:
        inset -5px -7px 12px rgba(0,0,0,.24),
        inset 4px 4px 10px rgba(255,255,255,.54),
        0 0 0 5px color-mix(in srgb, var(--marker-color) 22%, transparent);
    }

    .stop-popup {
      min-width: 220px;
      color: #0f172a;
    }

    .stop-popup h3 {
      margin: 0 0 10px;
    }

    .stop-eta-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-top: 1px solid #e2e8f0;
    }

    .eta-dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
    }
  </style>
</head>

<body>
  <main class="app">
    <header>
      <div>
        <p class="eyebrow">CampusCruise Transit Grid</p>
        <h1>CampusCruise Bus Tracker</h1>
      </div>

      <div class="top-actions">
        <button class="control-button" id="theme-btn">Bright theme</button>
        <div class="network-badge" id="network-badge">Live</div>
      </div>
    </header>

    <section class="layout" id="layout">
      <aside>
        <button class="collapse-tab" id="collapse-btn">‹</button>

        <div class="sidebar-content">
          <div class="section-heading">
            <span>Active buses</span>
            <b id="bus-count">0</b>
          </div>

          <div class="bus-list" id="bus-list">
            Loading road-track positions…
          </div>

          <div class="buffer-card">
            <span>Buffered pings</span>
            <strong id="buffer-count">0</strong>
            <small>Last sync: <span id="last-sync">—</span></small>
          </div>
        </div>
      </aside>

      <div class="map-panel">
        <div id="map"></div>
        <div class="map-hint">Click any stop marker to see ETA for every bus serving that stop.</div>
      </div>
    </section>

    <footer>
      <span>Updates every: <b id="update-interval">2s</b></span>
      <span>Network mode: <b id="network-mode">Full</b></span>
      <span>Last update: <b id="last-update">—</b></span>
    </footer>
  </main>

  <script>
    const API_BASE = "http://127.0.0.1:8000";

    let map;
    let tileLayer;
    let theme = "dark";
    let sidebarOpen = true;
    let selectedBusId = null;
    let busMarkers = {};
    let busTrails = {};
    let busHistory = {};
    let currentBuses = {};

    const mapCenter = [17.386, 78.4895];

    function detectNetworkQuality() {
      if (navigator.connection && navigator.connection.downlink < 1) return "poor";
      return "good";
    }

    function getTileUrl() {
      return theme === "dark"
        ? "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
        : "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png";
    }

    function bearing(from, to) {
      const lat1 = from[0] * Math.PI / 180;
      const lng1 = from[1] * Math.PI / 180;
      const lat2 = to[0] * Math.PI / 180;
      const lng2 = to[1] * Math.PI / 180;
      const y = Math.sin(lng2 - lng1) * Math.cos(lat2);
      const x = Math.cos(lat1) * Math.sin(lat2) -
        Math.sin(lat1) * Math.cos(lat2) * Math.cos(lng2 - lng1);
      return ((Math.atan2(y, x) * 180) / Math.PI + 360) % 360;
    }

    function getBusIcon(bus, rotation) {
      return L.divIcon({
        className: "",
        html: `
          <div class="bus-marker" style="--marker-color:${bus.marker_color}; transform: rotate(${rotation}deg)">
            <span>➤</span>
          </div>
        `,
        iconSize: [42, 42],
        iconAnchor: [21, 21]
      });
    }

    function stopEtaHtml(stopName, etas) {
      const rows = etas.map(eta => `
        <div class="stop-eta-row">
          <span class="eta-dot" style="background:${eta.marker_color}; box-shadow:0 0 12px ${eta.marker_color}"></span>
          <div>
            <strong>${eta.bus_label}</strong>
            <small>${eta.route_name}</small>
          </div>
          <b>${eta.eta_minutes} min</b>
        </div>
      `).join("");

      return `
        <div class="stop-popup">
          <h3>${stopName}</h3>
          ${rows || "<p>No active buses for this stop.</p>"}
        </div>
      `;
    }

    async function loadRoutes() {
      const res = await fetch(`${API_BASE}/routes`);
      const data = await res.json();

      Object.values(data.routes).forEach(route => {
        const roadTrack = route.track && route.track.length ? route.track : route.stops;
        const latlngs = roadTrack.map(point => [point.lat, point.lng]);

        L.polyline(latlngs, {
          color: "#050816",
          weight: 11,
          opacity: 0.72,
          lineCap: "round",
          lineJoin: "round"
        }).addTo(map);

        L.polyline(latlngs, {
          color: route.color,
          weight: 5,
          opacity: 0.95,
          lineCap: "round",
          lineJoin: "round"
        }).addTo(map);

        route.stops.slice(0, -1).forEach((stop, stopIndex) => {
          const marker = L.circleMarker([stop.lat, stop.lng], {
            radius: 8,
            color: route.color,
            fillColor: getComputedStyle(document.body).getPropertyValue("--stop-fill"),
            fillOpacity: 1,
            weight: 3
          }).addTo(map);

          marker.bindTooltip(`<b>${stop.name}</b><br/>Click for ETA`);

          marker.on("click", async () => {
            marker.bindPopup("<div class='stop-popup'><h3>Loading ETA…</h3></div>").openPopup();

            const network = detectNetworkQuality();
            const etaRes = await fetch(
              `${API_BASE}/stop-etas?route_id=${route.id}&stop_index=${stopIndex}&network=${network}`
            );

            const etaData = await etaRes.json();
            marker.setPopupContent(stopEtaHtml(etaData.stop_name, etaData.etas));
          });
        });
      });
    }

async function updateBuses() {
    try {
        // We fetch the latest data from FastAPI server
        const res = await fetch(`${API_BASE}/get-latest`);
        const bus = await res.json();

        if (bus.error) {
            console.log("Waiting for bus data...");
            return;
        }

        const point = [bus.lat, bus.lon];

        // If the bus marker doesn't exist yet, create it
        if (!busMarkers["bus_1"]) {
            busMarkers["bus_1"] = L.marker(point, {
                icon: getBusIcon({marker_color: "#38bdf8", label: "Technobot-1"}, 0)
            }).addTo(map);
        } else {
            // Move the bus to the new position
            busMarkers["bus_1"].setLatLng(point);
        }

        // Update the UI status
        document.getElementById("network-badge").textContent = bus.network_strength;
        document.getElementById("network-badge").className = 
            bus.network_strength === "Offline" ? "network-badge offline" : "network-badge";
        
        document.getElementById("last-update").textContent = new Date().toLocaleTimeString();

    } catch (e) {
        console.error("Backend not reachable. Make sure FastAPI is running!");
        document.getElementById("network-badge").textContent = "Offline";
        document.getElementById("network-badge").className = "network-badge offline";
    }
}

    function updateSidebar() {
      const list = document.getElementById("bus-list");
      const buses = Object.values(currentBuses);

      document.getElementById("bus-count").textContent = buses.length;

      list.innerHTML = buses.map(bus => `
        <button class="bus-card ${selectedBusId === bus.id ? "active" : ""}" onclick="focusBus('${bus.id}')">
          <div class="bus-card-header">
            <span class="bus-color" style="background:${bus.marker_color}; box-shadow:0 0 18px ${bus.marker_color}"></span>
            <div>
              <h2>${bus.label}</h2>
              <p>${bus.route_name}</p>
            </div>
            <small>Active</small>
          </div>
          <div class="bus-details">
            <span>Next stop</span>
            <strong>${bus.next_stop}</strong>
          </div>
        </button>
      `).join("");
    }

    function focusBus(busId) {
      selectedBusId = busId;

      if (busMarkers[busId]) {
        map.panTo(busMarkers[busId].getLatLng());
        busMarkers[busId].openPopup();
      }

      updateSidebar();
    }

    async function updateBufferInfo() {
      try {
        const res = await fetch(`${API_BASE}/status`);
        const data = await res.json();
        document.getElementById("buffer-count").textContent = data.buffer_size || 0;
      } catch {}
    }

    function toggleTheme() {
      theme = theme === "dark" ? "bright" : "dark";
      document.body.classList.toggle("bright", theme === "bright");

      document.getElementById("theme-btn").textContent =
        theme === "dark" ? "Bright theme" : "Dark theme";

      if (tileLayer) map.removeLayer(tileLayer);

      tileLayer = L.tileLayer(getTileUrl(), {
        attribution: "© OpenStreetMap contributors © CARTO"
      }).addTo(map);
    }

    function toggleSidebar() {
      sidebarOpen = !sidebarOpen;

      document.getElementById("layout").classList.toggle("collapsed", !sidebarOpen);
      document.getElementById("collapse-btn").textContent = sidebarOpen ? "‹" : "›";
    }

    async function start() {
      map = L.map("map", { zoomControl: false }).setView(mapCenter, 16);

      L.control.zoom({ position: "bottomright" }).addTo(map);

      tileLayer = L.tileLayer(getTileUrl(), {
        attribution: "© OpenStreetMap contributors © CARTO"
      }).addTo(map);

      document.getElementById("theme-btn").addEventListener("click", toggleTheme);
      document.getElementById("collapse-btn").addEventListener("click", toggleSidebar);

      await loadRoutes();
      await updateBuses();

      setInterval(() => {
        const interval = detectNetworkQuality() === "poor" ? 5000 : 2000;
        document.getElementById("update-interval").textContent = `${interval / 1000}s`;
        updateBuses();
      }, 2000);
    }

    start();
  </script>
</body>
</html>
