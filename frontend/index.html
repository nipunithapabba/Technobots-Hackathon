<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CampusCruise</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;font-family:Inter,'Segoe UI',sans-serif;}

    body{
      --bg:#07111f;
      --panel:rgba(13,20,36,0.97);
      --surface:rgba(22,32,52,0.97);
      --text:#e2e8f0;
      --muted:#64748b;
      --border:rgba(148,163,184,0.15);
      --accent:#38bdf8;
      --pink:#f472b6;
      color:var(--text);
      background:var(--bg);
    }

    body.bright{
      --bg:#f0f9ff;
      --panel:rgba(255,255,255,0.97);
      --surface:rgba(240,249,255,0.97);
      --text:#0f172a;
      --muted:#64748b;
      --border:rgba(14,116,144,0.18);
      --accent:#0284c7;
      --pink:#db2777;
    }

    .app{height:100vh;display:flex;flex-direction:column;}

    header{
      height:62px;padding:0 20px;
      background:var(--panel);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
      flex-shrink:0;z-index:100;
    }

    .header-left { display: flex; align-items: center; gap: 15px; }

    .brand{display:flex;flex-direction:column;gap:1px;}
    .brand-sub{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--accent);font-weight:700;}
    .brand-name{font-size:1.15rem;font-weight:700;color:var(--text);}

    .header-right{display:flex;align-items:center;gap:8px;}

    .pill-btn{
      border:1px solid var(--border);
      background:var(--surface);
      color:var(--text);
      border-radius:999px;
      padding:7px 14px;
      font:inherit;font-size:0.78rem;font-weight:600;
      cursor:pointer;
      transition:border-color 0.18s,background 0.18s;
      white-space:nowrap;
    }
    .pill-btn:hover{border-color:var(--accent);}

    .net-badge{
      padding:7px 14px;border-radius:999px;
      font-size:0.78rem;font-weight:700;color:#fff;
      background:#16a34a;transition:background 0.3s;
    }
    .net-badge.offline{background:#dc2626;}
    .net-badge.syncing{background:#d97706;}

    .body{flex:1;min-height:0;display:flex;overflow:hidden;}

    #sidebar{
      width:300px;
      background:var(--panel);
      border-right:1px solid var(--border);
      display:flex;flex-direction:column;
      transition:width 0.28s ease,opacity 0.28s ease;
      flex-shrink:0;overflow:hidden;z-index:50;
    }
    #sidebar.closed{width:0;opacity:0;pointer-events:none;}

    .sidebar-inner{
      width:300px;height:100%;
      padding:14px;
      display:flex;flex-direction:column;gap:12px;
      overflow-y:auto;
    }

    .sidebar-toggle{
      position:absolute;
      top:78px;left:300px;
      width:22px;height:44px;
      background:var(--panel);
      border:1px solid var(--border);
      border-left:none;
      border-radius:0 8px 8px 0;
      cursor:pointer;z-index:200;
      display:flex;align-items:center;justify-content:center;
      color:var(--muted);font-size:0.9rem;
      transition:left 0.28s ease;
    }
    #sidebar.closed ~ .sidebar-toggle{left:0;}

    .sec-label{
      font-size:0.68rem;text-transform:uppercase;
      letter-spacing:0.12em;color:var(--muted);font-weight:800;
    }

    .bus-card{
      width:100%;text-align:left;
      border:1px solid var(--border);
      background:var(--surface);
      color:var(--text);
      border-radius:14px;padding:12px;
      cursor:pointer;transition:all 0.2s ease;
      border-left: 4px solid transparent;
    }
    .bus-card:hover{border-color:var(--accent);}
    .bus-card.active{border-color:var(--accent); background:rgba(56, 189, 248, 0.05); border-left-color: var(--accent);}

    .bc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .bc-stripe{width:4px;height:36px;border-radius:99px;flex-shrink:0;}
    .bc-info{flex:1;min-width:0;}
    .bc-name{font-size:0.92rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .bc-route{font-size:0.75rem;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    .bc-row{
      display:flex;justify-content:space-between;align-items:center;
      font-size:0.78rem;color:var(--muted);
      padding:4px 0;border-top:1px solid var(--border);
    }
    .bc-row strong{color:var(--text);font-size:0.82rem;}
    .bc-eta{
      margin-top:6px;padding:6px 10px;
      background:rgba(56,189,248,0.08);
      border:1px solid rgba(56,189,248,0.2);
      border-radius:8px;
      display:flex;justify-content:space-between;align-items:center;
      font-size:0.78rem;color:var(--muted);
    }
    .bc-eta b{color:var(--accent);font-size:1rem;}

    .occ-badge {
        font-size: 0.65rem;
        padding: 2px 8px;
        border-radius: 4px;
        font-weight: bold;
        text-transform: uppercase;
    }
    .Low { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
    .Medium { background: rgba(234, 179, 8, 0.15); color: #fbbf24; border: 1px solid rgba(234, 179, 8, 0.3); }
    .High { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); box-shadow: 0 0 8px rgba(239, 68, 68, 0.2); }

    .High-Traffic { filter: hue-rotate(90deg) brightness(1.2); }

    .map-wrap{flex:1;position:relative;min-width:0;}
    #map{width:100%;height:100%;}

    .map-hint{
      position:absolute;top:12px;left:50%;transform:translateX(-50%);
      z-index:10;padding:7px 16px;border-radius:999px;
      background:var(--panel);border:1px solid var(--border);
      font-size:0.78rem;color:var(--muted);white-space:nowrap;
      pointer-events:none;
      backdrop-filter: blur(4px);
    }

    footer{
      height:36px;padding:0 18px;
      background:var(--panel);border-top:1px solid var(--border);
      display:flex;align-items:center;gap:20px;
      font-size:0.72rem;color:var(--muted);flex-shrink:0;
    }
    footer b{color:var(--text);}

    .bm{width:34px;height:34px;display:flex;align-items:center;justify-content:center;transform-origin:center;}

    .sp{min-width:190px;font-family:Inter,'Segoe UI',sans-serif;}
    .sp-title{font-size:0.88rem;font-weight:700;color:#0f172a;margin-bottom:8px;}
    .sp-row{display:grid;grid-template-columns:8px 1fr auto;gap:8px;align-items:center;padding:6px 0;border-top:1px solid #e2e8f0;font-size:0.8rem;}
    .sp-dot{width:8px;height:8px;border-radius:50%;}
    .sp-bus{color:#334155;}
    .sp-time{font-weight:700;color:#0284c7;}
    .sp-note{grid-column:2/-1;font-size:0.7rem;color:#94a3b8;margin-top:-4px;padding-bottom:2px;}

    .leaflet-popup-content-wrapper{border-radius:14px!important;padding:2px!important;box-shadow:0 4px 20px rgba(0,0,0,0.18)!important;}
    .leaflet-popup-content{margin:12px 14px!important;}
    .leaflet-popup-tip{display:none;}
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <button class="pill-btn" id="menu-toggle" style="padding: 5px 10px; font-size: 1.1rem;">☰</button>
      <div class="brand">
        <span class="brand-sub">Campus Transit</span>
        <span class="brand-name">🚌 CampusCruise</span>
      </div>
    </div>
    <div class="header-right">
      <button class="pill-btn" id="theme-btn">☀ Bright</button>
      <div class="net-badge" id="net-badge">● Live</div>
    </div>
  </header>

  <div class="body">
    <div id="sidebar">
      <div class="sidebar-inner">
        <div class="sec-label">Active buses &nbsp;<span id="bus-count" style="color:var(--accent)">0</span></div>
        <div id="bus-list">
          <div style="color:var(--muted);font-size:0.82rem;padding:8px 0;">Connecting...</div>
        </div>
      </div>
    </div>

    <button class="sidebar-toggle" id="sb-toggle">›</button>

    <div class="map-wrap">
      <div id="map"></div>
      <div class="map-hint">● Click any stop marker for live ETA</div>
    </div>
  </div>

  <footer>
    <span>Poll: <b id="poll-rate">2s</b></span>
    <span>Mode: <b id="net-mode">Full</b></span>
    <span>Updated: <b id="last-upd">—</b></span>
  </footer>
</div>

<script>
const API = "https://technobots-bus-tracker.onrender.com";

const ROUTES = {
  bus_1: {
    label: "Bus A",
    name: "Main Gate → Library → Hostel",
    color: "#38bdf8",
    // These points now follow the actual curves of the CBIT roads
    path: [
      [17.3917, 78.3262], [17.3915, 78.3255], [17.3912, 78.3248], // Entrance road
      [17.3914, 78.3242], [17.3918, 78.3238], [17.3925, 78.3235], // Turning at the circle
      [17.3930, 78.3232], [17.3938, 78.3230], [17.3945, 78.3228]  // Road to Library
    ],
    stops: [
      {n: "Main Gate", i: 0}, 
      {n: "Admin Block", i: 4}, 
      {n: "Library", i: 8}
    ]
  },
  bus_2: {
    label: "Bus B",
    name: "Main Gate → ECE → Sports",
    color: "#f472b6",
    path: [
      [17.3917, 78.3262], [17.3910, 78.3265], [17.3905, 78.3268], // Heading South
      [17.3900, 78.3272], [17.3895, 78.3278], [17.3890, 78.3285], // Curve around ECE
      [17.3885, 78.3292], [17.3880, 78.3300]                      // To Sports Ground
    ],
    stops: [
      {n: "Main Gate", i: 0}, 
      {n: "ECE Labs", i: 4}, 
      {n: "Sports Ground", i: 7}
    ]
  }
};

const map = L.map("map",{zoomControl:false}).setView([17.3850, 78.4867], 16);
L.control.zoom({position:"bottomright"}).addTo(map);

let tile = L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {maxZoom:19}).addTo(map);

let isDark = true;
let sbOpen = true;
let selBus = null;
let isFollowing = false;
let markers = {};
let etaCache = {};
let apiBuses = {};
let pathIdx = {bus_1:0, bus_2:0};
let pathDir = {bus_1:1, bus_2:1};
let animID = {};

function drawRoutes(){
  for(const [id, r] of Object.entries(ROUTES)){
    L.polyline(r.path,{color:r.color, weight:6, opacity:0.5, lineCap:"round", lineJoin: "round"}).addTo(map);
    r.stops.forEach((s, si)=>{
      const pos = r.path[s.i];
      const cm = L.circleMarker(pos,{radius:7, color:r.color, fillColor:isDark?"#07111f":"#fff", fillOpacity:1, weight:2}).addTo(map);
      cm.bindTooltip(`<b>${s.n}</b>`);
      cm.on("click", async () => {
        cm.bindPopup(`<div class="sp">Fetching ETAs...</div>`).openPopup();
        let rows = [];
        for(const bid of Object.keys(ROUTES)){
            try {
                const res = await fetch(`${API}/eta?bus_id=${bid}&stop_index=${s.i}&network=good`);
                const d = await res.json();
                rows.push({label: ROUTES[bid].label, color: ROUTES[bid].color, eta: d.eta_minutes});
            } catch { rows.push({label: ROUTES[bid].label, color: ROUTES[bid].color, eta: "—"}); }
        }
        cm.setPopupContent(`<div class="sp"><div class="sp-title">${s.n}</div>` + 
            rows.map(r => `<div class="sp-row"><span class="sp-dot" style="background:${r.color}"></span><span>${r.label}</span><b>${r.eta} min</b></div>`).join("") + `</div>`);
      });
    });
  }
}

function busIcon(color, deg){
  const svg=`<svg width="34" height="34" viewBox="0 0 34 34"><g transform="rotate(${deg},17,17)"><polygon points="17,2 32,32 17,24 2,32" fill="${color}" stroke="white" stroke-width="2"/><circle cx="17" cy="17" r="3" fill="white"/></g></svg>`;
  return L.divIcon({className:"", html:`<div class="bm">${svg}</div>`, iconSize:[34,34], iconAnchor:[17,17]});
}

function hdg(a,b){ return (Math.atan2(b[1]-a[1], b[0]-a[0])*180/Math.PI-90+360)%360; }

/* ── Smooth road-following animation (LOOPING VERSION) ── */
function moveBus(id){
  const r = ROUTES[id];
  if(!r) return;
  const path = r.path;
  let idx = pathIdx[id];

  // Logic to LOOP (Go 0 -> 1 -> 2 -> End -> 0)
  // This now matches your backend simulator logic perfectly
  let nxt = idx + 1; 
  if(nxt >= path.length) { 
      nxt = 0; 
  }

  const from = path[idx], to = path[nxt];
  const deg = hdg(from, to);
  
  /* DUR = 5000 (5 seconds). 
    This slows down the "glide" between waypoints so it doesn't look like a race car.
  */
  const DUR = 5000; 
  const t0 = performance.now();

  if(animID[id]) cancelAnimationFrame(animID[id]);

  function step(now){
    const p = Math.min((now - t0) / DUR, 1);
    
    // Smooth interpolation
    const lat = from[0] + (to[0] - from[0]) * p;
    const lng = from[1] + (to[1] - from[1]) * p;

    if(!markers[id]){
      markers[id] = L.marker([lat, lng], {icon: busIcon(r.color, deg), zIndexOffset: 1000}).addTo(map);
      markers[id].bindTooltip(`<b>${r.label}</b>`, {direction: "top"});
    } else {
      markers[id].setLatLng([lat, lng]);
      // Update rotation arrow
      markers[id].setIcon(busIcon(r.color, deg));
    }

    // Apply High Traffic filter if occupancy is high
    if(apiBuses[id]?.occupancy === "High") {
        if(markers[id]._icon) markers[id]._icon.classList.add("High-Traffic");
    } else if (markers[id]._icon) {
        markers[id]._icon.classList.remove("High-Traffic");
    }

    if(p < 1) {
      animID[id] = requestAnimationFrame(step);
    } else {
      // Move to the next waypoint
      pathIdx[id] = nxt; 
      // Small pause (200ms) at the waypoint before starting the next segment
      setTimeout(() => moveBus(id), 200); 
    }
  }
  animID[id] = requestAnimationFrame(step);
}

async function pollETA(id){
  try{
    const r = await fetch(`${API}/eta?bus_id=${id}&stop_index=1`);
    const d = await r.json();
    etaCache[id] = d;
    if(d.eta_minutes <= 1 && navigator.vibrate) navigator.vibrate([200, 100, 200]);
    renderSidebar();
  } catch{}
}

function renderSidebar(){
  const list = document.getElementById("bus-list");
  const ids = Object.keys(apiBuses);
  document.getElementById("bus-count").textContent = ids.length;
  list.innerHTML = ids.map(id => {
    const bus = apiBuses[id];
    const rd = ROUTES[id];
    const eta = etaCache[id];
    return `<button class="bus-card ${selBus===id?'active':''}" onclick="focusBus('${id}')">
      <div class="bc-top">
        <div class="bc-stripe" style="background:${rd?rd.color:'#38bdf8'}"></div>
        <div class="bc-info"><div class="bc-name">${rd?rd.label:id}</div><div class="bc-route">${rd?rd.name:'—'}</div></div>
        <div class="occ-badge ${bus.occupancy}">${bus.occupancy}</div>
      </div>
      <div class="bc-row"><span>Next</span><strong>${bus.next_stop}</strong></div>
      <div class="bc-row"><span>Weather</span><strong>${bus.weather}</strong></div>
      ${eta ? `<div class="bc-eta"><span>ETA</span><b>${eta.eta_minutes} min</b></div>`:''}
    </button>`;
  }).join("");
}

function focusBus(id){
  selBus = (selBus === id && isFollowing) ? null : id;
  isFollowing = !!selBus;
  if(selBus && markers[id]) map.flyTo(markers[id].getLatLng(), 17);
  renderSidebar();
}

function setBadge(s){
  const b = document.getElementById("net-badge");
  b.style.background = s==="live"?"#16a34a":"#dc2626";
  b.innerHTML = s==="live"?"● Live":"● Offline";
}

document.getElementById("theme-btn").addEventListener("click",()=>{
  isDark = !isDark;
  document.body.classList.toggle("bright", !isDark);
  map.removeLayer(tile);
  tile = L.tileLayer(isDark ? "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png" : "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
});

/* ── Sidebar & Menu Toggle Logic ── */
const sbEl = document.getElementById("sidebar");
const sbBtn = document.getElementById("sb-toggle");
const menuBtn = document.getElementById("menu-toggle");

function toggleSidebar() {
  sbOpen = !sbOpen;
  sbEl.classList.toggle("closed", !sbOpen);
  if(sbBtn) {
    sbBtn.style.left = sbOpen ? "300px" : "0";
    sbBtn.innerHTML = sbOpen ? "›" : "‹";
  }
  setTimeout(() => map.invalidateSize(), 300);
}

if(menuBtn) menuBtn.addEventListener("click", toggleSidebar);
if(sbBtn) sbBtn.addEventListener("click", toggleSidebar);

setInterval(() => {
  pollBuses();
  if(isFollowing && selBus && markers[selBus]) map.panTo(markers[selBus].getLatLng());
}, 2000);

setInterval(() => { pollETA("bus_1"); pollETA("bus_2"); }, 5000);

drawRoutes();
moveBus("bus_1");
setTimeout(()=>moveBus("bus_2"), 800);
pollBuses();
</script>
</body>
</html>
